<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="William">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header>
        <div>
            <img src="images/logo.png" alt="Green Leaf Energy company logo" width="80" height="80">
            <h1>Green Leaf Energy</h1>
            <h1>Job Application Form</h1>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Job Description</a></li>
                <li><a href="apply.html">Apply</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <form method="POST" action="https://mercury.swin.edu.au/it000000/formtest.php">

                <label for="jobref">Job Reference Number:</label>
                <input type="text" id="jobref" name="jobref" required
                       pattern="[A-Za-z0-9]{5}"
                       title="Exactly 5 letters or numbers"><br><br>

                <fieldset>
                    <legend>Personal Information</legend>

                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="fname" required
                           maxlength="20"
                           pattern="[A-Za-z]+"><br><br>

                    <label for="lname">Last Name:</label>
                    <input type="text" id="lname" name="lname" required
                           maxlength="20"
                           pattern="[A-Za-z]+"><br><br>

                    <label for="dob">Date of Birth:</label>
                    <input type="text" id="dob" name="dob" required
                           pattern="\d{2}/\d{2}/\d{4}"
                           placeholder="dd/mm/yyyy"><br><br>
                </fieldset>

                <fieldset>
                    <legend>Gender</legend>

                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </fieldset><br>

                <fieldset>
                    <legend>Contact Information</legend>

                    <label for="address">Street Address:</label>
                    <input type="text" id="address" name="address" required maxlength="40"><br><br>

                    <label for="suburb">Suburb/Town:</label>
                    <input type="text" id="suburb" name="suburb" required maxlength="40"><br><br>

                    <label for="state">State:</label>
                    <select id="state" name="state" required>
                        <option value="">Select State</option>
                        <option value="VIC">VIC</option>
                        <option value="NSW">NSW</option>
                        <option value="QLD">QLD</option>
                        <option value="NT">NT</option>
                        <option value="WA">WA</option>
                        <option value="SA">SA</option>
                        <option value="TAS">TAS</option>
                        <option value="ACT">ACT</option>
                    </select><br><br>

                    <label for="postcode">Postcode:</label>
                    <input type="text" id="postcode" name="postcode" required
                           pattern="\d{4}"><br><br>

                    <label for="phonenumber">Phone Number:</label>
                    <input type="text" id="phonenumber" name="phonenumber" required
                           pattern="\d{8,12}"
                           title="8 to 12 digits"><br><br>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required><br><br>
                </fieldset>

                <fieldset>
                    <legend>Applicant Skills</legend>

                    <input type="checkbox" id="teamwork" name="skills[]" value="teamwork">
                    <label for="teamwork">Teamwork</label>

                    <input type="checkbox" id="coding" name="skills[]" value="coding">
                    <label for="coding">Coding</label>

                    <input type="checkbox" id="frontend" name="skills[]" value="frontend">
                    <label for="frontend">Frontend Development</label>

                    <input type="checkbox" id="backend" name="skills[]" value="backend">
                    <label for="backend">Software Development</label>

                    <br><br>

                    <label for="other_skills">Other Skills:</label><br>
                    <textarea id="other_skills" name="other_skills" rows="5" cols="30"></textarea>
                </fieldset><br>

                <button type="submit">Apply</button>
            </form>
        </section>
    </main>
